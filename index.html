<!DOCTYPE html>
<html>
<head>
    <link href="https://fonts.googleapis.com/css2?family=Poppins&display=swap" rel="stylesheet">
    <title>Quiz App</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

    <!-- Start Screen -->
    <div id="start-screen">
        <h1>Quiz Application</h1>
        <input type="text" id="username" placeholder="Enter your name">

        <select id="difficulty">
            <option value="easy">Easy</option>
            <option value="medium">Medium</option>
            <option value="hard">Hard</option>
        </select>

        <button onclick="startQuiz()">Start Quiz</button>
    </div>

    <!-- Quiz Screen -->
    <div id="quiz-screen" class="hidden">
        <h3 id="progress"></h3>
        <div id="timerBar"></div>
        <h2 id="question"></h2>

        <div class="options">
            <button onclick="selectAnswer('a')" id="a"></button>
            <button onclick="selectAnswer('b')" id="b"></button>
            <button onclick="selectAnswer('c')" id="c"></button>
            <button onclick="selectAnswer('d')" id="d"></button>
        </div>
    </div>

    <!-- Result -->
    <div id="result-screen" class="hidden">
        <h2 id="result"></h2>
        <p id="percentage"></p>

        <button onclick="showReview()">Review Answers</button>
        <button onclick="restartQuiz()">Restart</button>
    </div>

    <!-- Review -->
    <div id="review-screen" class="hidden">
        <h2>Review Answers</h2>
        <div id="review"></div>
        <button onclick="restartQuiz()">Restart</button>
    </div>

</div>

<script src="script.js"></script>
</body>
</html>
